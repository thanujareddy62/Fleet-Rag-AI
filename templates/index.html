<!DOCTYPE html>
<html>
<head>
    <title>Fleet Agentic AI</title>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            background-color: #1e293b;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 75%;
            line-height: 1.5;
            font-size: 14px;
        }

        .user {
            align-self: flex-end;
            background-color: #2563eb;
        }

        .bot {
            align-self: flex-start;
            background-color: #1e293b;
            border: 1px solid #334155;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            outline: none;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background-color: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .input-area button:hover {
            background-color: #1d4ed8;
        }

        .loader {
            border: 3px solid #1e293b;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        .message.bot pre {
            white-space: pre-wrap;
            font-family: Consolas, monospace;
            font-size: 13px;
            margin: 0;
        }

        .code-block {
            background-color: #020617;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
            overflow-x: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            🚚 Fleet Agentic AI Dashboard
        </div>

        <div class="chat-box" id="chatBox">
            {% if history %}
                {% for chat in history %}
                    <div class="message user">{{ chat.user }}</div>
                    <div class="message bot">
                        <pre class="code-block">{{ chat.bot }}</pre>
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <form method="POST" class="input-area">
            <input type="text" name="question" placeholder="Ask about drivers, vehicles, routes..." required>
            <button type="submit">Send</button>
        </form>

        <div class="footer">
            Hybrid RAG + FAISS + Local LLM
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        chatBox.scrollTop = chatBox.scrollHeight;
        hljs.highlightAll();
    </script>
</body>
</html>
