<!DOCTYPE html>
<html>
<head>
    <title>Fleet Agentic AI</title>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="container">
        <div class="header">
            🚚 Fleet Agentic AI Dashboard
        </div>

        <div class="chat-box" id="chatBox">
            {% if history %}
                {% for chat in history %}
                    <div class="message user">{{ chat.user }}</div>
                    <div class="message bot">
                        <pre><code id="bot{{ loop.index }}">{{ chat.bot }}</code></pre>
                        <button onclick="copyText('bot{{ loop.index }}')" class="copy-btn">Copy</button>
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <div id="typing" class="typing-indicator">
            AI is thinking...
        </div>

        <form method="POST" class="input-area" id="chatForm">
            <input type="text" name="question" placeholder="Ask about drivers, vehicles, routes..." required>
            <button type="submit">Send</button>
        </form>

        <div class="footer">
            Hybrid RAG + FAISS + Local LLM
        </div>
    </div>


    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
